{% set name = "nipreps-versions" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/nipreps_versions-{{ version }}.tar.gz
  sha256: 45d2507ccac628daec195d0c6d4ddcd72b5472e9779b805828ea36ee20437249

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pdm-backend
    - uv
    - pip
  run:
    - python >={{ python_min }}
    - setuptools-scm >=7
    - packaging >=17

test:
  imports:
    - nipreps_versions
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/nipreps/version-schemes
  summary: Version schemes for nipreps tools
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - synchon
