{% set name = "nipreps-versions" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/nipreps_versions-{{ version }}.tar.gz
  sha256: 18157b78b71cefee7032c0f86a7698e721dcb09ca383f993e10ea5a48bd8bc0a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-scm
    - pip
  run:
    - python >={{ python_min }}
    - setuptools-scm >=7
    - packaging

test:
  imports:
    - nipreps_versions
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/nipreps/version-schemes
  summary: Version schemes for nipreps tools
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - synchon
